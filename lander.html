<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="icon" href="./assets/img/logo.png">
<title>Neon Runner Dash — Age Verification</title>
<meta name="description" content="Neon Runner Dash is a fast-paced neon arcade runner game with responsive design.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #ff00c8;
    --secondary: #00ffff;
    --dark: #0a0a1a;
    --darker: #050510;
    --light: #ccd0ff;
    --accent: #9d00ff;
    --card-bg: rgba(20, 10, 40, 0.7);
    --text: #ffffff;
  }
  
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }
  
  body {
    font-family: 'Rajdhani', sans-serif;
    background: linear-gradient(135deg, var(--darker), var(--dark));
    color: var(--text);
    line-height: 1.6;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  
  .container {
    width: 100%;
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 20px;
  }
  
  /* Navigation */
  .nav {
    background-color: rgba(10, 5, 20, 0.9);
    backdrop-filter: blur(10px);
    padding: 15px 0;
    position: sticky;
    top: 0;
    z-index: 100;
    border-bottom: 1px solid var(--accent);
  }
  
  .nav-inner {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
  }
  
  .logo {
    display: flex;
    align-items: center;
    text-decoration: none;
    color: var(--text);
    font-weight: 700;
    font-size: 1.5rem;
  }
  
  .logo img {
    height: 40px;
    margin-right: 10px;
  }
  
  .menu {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
  }
  
  .menu a {
    color: var(--light);
    text-decoration: none;
    font-weight: 600;
    transition: color 0.3s, text-shadow 0.3s;
  }
  
  .menu a:hover {
    color: var(--secondary);
    text-shadow: 0 0 10px var(--secondary);
  }
  
  .right {
    display: flex;
    gap: 15px;
    align-items: center;
  }
  <style>
  body {
    margin: 0;
    height: 100vh;
    background: url("https://raw.githubusercontent.com/neo-aussie/img/refs/heads/main/spinbet-au-lap.png") no-repeat center center;
    background-size: cover;
  }
 
  /* Mobile (max 600px) */
  @media (max-width: 600px) {
    body {
      background-image: url("https://raw.githubusercontent.com/neo-aussie/img/refs/heads/main/spinbet-au-mob.png");
    }
  }
 
  /* Tablet (601px – 1024px) */
  @media (min-width: 601px) and (max-width: 1024px) {
    body {
      background-image: url("https://raw.githubusercontent.com/neo-aussie/img/refs/heads/main/spinbet-au-mob.png");
    }
  }
 
  /* Desktop (above 1024px) */
  @media (min-width: 1025px) {
    body {
      background-image: url("https://raw.githubusercontent.com/neo-aussie/img/refs/heads/main/spinbet-au-lap.png");
    }
  }
</style>
 
  
  <div class="container" style="display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap">
    <div>© 2025 Neon Runner Dash. All rights reserved.</div>
    <div style="display:flex;gap:12px;align-items:center">
      <span class="badge">Responsive • Age-gate</span>
    </div>
  </div>
</footer>

<script src="assets/js/main.js"></script>
<script>
  // Mobile menu toggle
  document.getElementById('nav-toggle').addEventListener('click', function() {
    const menu = document.getElementById('nav-menu');
    menu.classList.toggle('active');
  });
</script>
</body>
</html>
